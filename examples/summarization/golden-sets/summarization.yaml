name: news-summarization
version: "1.0.0"
description: News article summarization quality evaluation
interaction_type: single_turn
tags: [summarization, news, hallucination-detection]
author: regtrace
created_at: "2026-06-01T00:00:00Z"
updated_at: "2026-06-01T00:00:00Z"
test_cases:
  - id: sum-001
    description: Accurate faithful summary of a technology article
    input: "Article: 'OpenAI announced on Tuesday that it has raised $6.6 billion in new funding, valuing the company at $157 billion. The funding round was led by Thrive Capital and included participation from Microsoft, Nvidia, and SoftBank. The company plans to use the funds to accelerate AI research, increase compute capacity, and build new data centers. OpenAI reported that ChatGPT now has over 250 million weekly active users.'"
    system_prompt: "Summarize the following news article in 2-3 sentences. Be concise and factual. Do not add information not present in the source."
    expected_output: "OpenAI raised $6.6 billion in new funding at a $157 billion valuation. The round was led by Thrive Capital with participation from Microsoft, Nvidia, and SoftBank. The funds will go toward AI research, compute capacity, and data centers, while ChatGPT now has over 250 million weekly active users."
    actual_output: null
    metrics: [format]
    tags: [accurate, technology]
    weight: 1

  - id: sum-002
    description: Hallucinated person name not in the original article
    input: "Article: 'The Federal Reserve kept interest rates unchanged at its September meeting, maintaining the benchmark rate at 5.25-5.50 percent. Chair Jerome Powell indicated that rate cuts could begin in 2025 if inflation continues to moderate. The decision was unanimous. Stock markets rose slightly following the announcement.'"
    system_prompt: "Summarize the following news article in 2-3 sentences. Be concise and factual. Do not add information not present in the source."
    expected_output: "The Federal Reserve held interest rates steady at 5.25-5.50 percent at its September meeting. Chair Jerome Powell signaled potential rate cuts in 2025 if inflation moderates. The unanimous decision led to a slight rise in stock markets."
    actual_output: null
    metrics: [format]
    tags: [hallucination, person]
    weight: 2

  - id: sum-003
    description: Fabricated statistic not present in the source
    input: "Article: 'Apple announced the iPhone 16 at its annual September event. The new model features a faster A18 chip, improved camera system with 48MP sensor, and a new Capture Button for photos and videos. Pricing starts at $799. Pre-orders begin Friday with availability starting September 20.'"
    system_prompt: "Summarize the following news article in 2-3 sentences. Be concise and factual. Do not add information not present in the source."
    expected_output: "Apple announced the iPhone 16 with an A18 chip, improved 48MP camera, and a new Capture Button. Pricing starts at $799. Pre-orders begin Friday with availability on September 20."
    actual_output: null
    metrics: [format]
    tags: [fabrication, statistic]
    weight: 2

  - id: sum-004
    description: Missing key detail — fails to mention the cause in the article
    input: "Article: 'Thousands of flights were canceled across the United States on Friday after a major IT outage affected Delta, United, and American Airlines. The outage was traced to a failed software update from cybersecurity firm CrowdStrike that caused Windows systems to crash. Airlines expect normal operations to resume within 48 hours.'"
    system_prompt: "Summarize the following news article in 2-3 sentences. Be concise and factual. Do not add information not present in the source."
    expected_output: "Thousands of US flights were canceled after a major IT outage hit Delta, United, and American Airlines. The outage was caused by a CrowdStrike software update that crashed Windows systems. Airlines expect normal operations within 48 hours."
    actual_output: null
    metrics: [format]
    tags: [missing-detail, omission]
    weight: 1.5

  - id: sum-005
    description: Correct facts but inflammatory tone
    input: "Article: 'Tesla reported Q3 delivery numbers that exceeded analyst expectations. The company delivered 462,890 vehicles globally, up from 435,059 in Q2. The stock rose 3.2% in after-hours trading. Tesla attributed the growth to improved production efficiency at its factories.'"
    system_prompt: "Summarize the following news article in 2-3 sentences. Be concise and factual. Use neutral professional tone. Do not add information not present in the source."
    expected_output: "Tesla's Q3 deliveries exceeded expectations at 462,890 vehicles, up from 435,059 in Q2. The stock rose 3.2% in after-hours trading. Growth was attributed to improved production efficiency."
    actual_output: null
    metrics: [format]
    tags: [tone, inflammatory]
    weight: 1.5

  - id: sum-006
    description: Overly verbose summary that includes unnecessary detail
    input: "Article: 'Starbucks announced it will eliminate the upcharge for non-dairy milk alternatives at its company-operated stores in the US and Canada starting November 7. The change applies to drinks ordered in-store, through drive-thru, on the app, or via delivery. CEO Brian Niccol said the move aligns with customer expectations for customization without extra fees.'"
    system_prompt: "Summarize the following news article in 2-3 sentences. Be concise and factual. Do not add information not present in the source."
    expected_output: "Starbucks will remove the non-dairy milk surcharge at company-operated stores in the US and Canada starting November 7. The change applies to all order methods. CEO Brian Niccol said it aligns with customer expectations."
    actual_output: null
    metrics: [format]
    tags: [verbose, length]
    weight: 1

  - id: sum-007
    description: Perfect concise two-sentence summary of a science article
    input: "Article: 'Scientists at MIT have developed a new type of battery that uses a solid-state electrolyte instead of the liquid electrolytes found in traditional lithium-ion batteries. The prototype achieved 500 charge cycles while retaining 80% capacity. The solid-state design reduces fire risk and could enable longer-range electric vehicles. The researchers estimate commercial production is still 3-5 years away.'"
    system_prompt: "Summarize the following news article in 2-3 sentences. Be concise and factual. Do not add information not present in the source."
    expected_output: "MIT scientists developed a solid-state battery prototype that retains 80% capacity after 500 charge cycles. The design reduces fire risk and could enable longer-range EVs, but commercial production is still 3-5 years away."
    actual_output: null
    metrics: [format]
    tags: [concise, accurate]
    weight: 1
