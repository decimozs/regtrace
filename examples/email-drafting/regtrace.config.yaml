# Regtrace config — Email Drafting example (Generate Mode)
# Claude generates emails via `regtrace run --generate`. Tone eval enabled.
# Needs ANTHROPIC_API_KEY in .env.
project:
  name: email-drafting-qa
  version: "1.0"
  description: Evaluating AI-generated email quality

golden_sets:
  - path: golden-sets/email-drafting.yaml
    enabled: true

metrics:
  enabled: [format, tone]
  default_threshold: 0.7
  format:
    sub_checks:
      length: true
      json_validity: false
      json_schema: false
      markdown_structure: false
      required_fields: true
      forbidden_content: true
      regex_match: false
    length_tolerance: 0.3
  factuality:
    mode: lenient
    claim_extraction_depth: shallow
  tone:
    sub_dimensions:
      formality: true
      sentiment: true
      assertiveness: true
      persona_consistency: true
      verbosity: true
  regression:
    enabled: true
    baseline_strategy: last_passing
    tolerance: 0.05
    critical_threshold: 0.15
    exclude_new_test_cases: true

judge:
  primary:
    provider: anthropic
    model: claude-haiku-4-5-20251001
    temperature: 0.1
    max_tokens: 4096
    timeout_ms: 30000
    retry_attempts: 3

generator:
  provider: anthropic
  model: claude-haiku-4-5-20251001
  temperature: 0.4
  max_tokens: 4096
  timeout_ms: 60000
  retry_attempts: 3

run:
  concurrency: 1

quality_gates:
  suite_score_minimum: 0.7
  max_failed_test_cases: 1
  max_low_confidence_ratio: 0.1
  regression_gate: true

output:
  run_history_limit: 50
  default_format: terminal
  color: auto
  ci_mode_auto_detect: true
