# Regtrace config — RAG Documentation example (LLM Judge)
# Uses LLM judge for factuality evaluation on RAG responses.
# Needs ANTHROPIC_API_KEY in .env.
project:
  name: rag-documentation-qa
  version: "1.0"
  description: Evaluating RAG response faithfulness against API documentation

golden_sets:
  - path: golden-sets/rag-documentation.yaml
    enabled: true

metrics:
  enabled: [format, factuality]
  default_threshold: 0.7
  format:
    sub_checks:
      length: true
      json_validity: false
      json_schema: false
      markdown_structure: false
      required_fields: true
      forbidden_content: true
      regex_match: false
    length_tolerance: 0.3
  factuality:
    mode: strict
    claim_extraction_depth: deep
  tone:
    sub_dimensions:
      formality: true
      sentiment: false
      assertiveness: false
      persona_consistency: false
      verbosity: false
  regression:
    enabled: true
    baseline_strategy: last_passing
    tolerance: 0.05
    critical_threshold: 0.15
    exclude_new_test_cases: true

judge:
  primary:
    provider: anthropic
    model: claude-haiku-4-5-20251001
    temperature: 0.1
    max_tokens: 4096
    timeout_ms: 30000
    retry_attempts: 3

run:
  concurrency: 1

quality_gates:
  suite_score_minimum: 0.7
  max_failed_test_cases: 1
  max_low_confidence_ratio: 0.1
  regression_gate: true

output:
  run_history_limit: 50
  default_format: terminal
  color: auto
  ci_mode_auto_detect: true
