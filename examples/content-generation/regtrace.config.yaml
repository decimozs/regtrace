# Regtrace config — Content Generation example
# Runs with format metrics by default. Add judge key and enable tone for full eval.
project:
  name: brand-content-qa
  version: "1.0"
  description: Evaluating brand content tone consistency

golden_sets:
  - path: golden-sets/content-generation.yaml
    enabled: true

metrics:
  enabled: [format]
  default_threshold: 0.7
  format:
    sub_checks:
      length: true
      json_validity: false
      json_schema: false
      markdown_structure: false
      required_fields: true
      forbidden_content: true
      regex_match: false
  factuality:
    mode: lenient
    claim_extraction_depth: shallow
  tone:
    sub_dimensions:
      formality: true
      sentiment: true
      assertiveness: true
      persona_consistency: true
      verbosity: true
  regression:
    enabled: true
    baseline_strategy: last_passing
    tolerance: 0.05
    critical_threshold: 0.15
    exclude_new_test_cases: true

judge:
  primary:
    provider: anthropic
    model: claude-3-5-sonnet-20240620
    temperature: 0.1
    max_tokens: 4096
    timeout_ms: 30000
    retry_attempts: 3

run:
  concurrency: 1

quality_gates:
  suite_score_minimum: 0.7
  max_failed_test_cases: 1
  max_low_confidence_ratio: 0.1
  regression_gate: true

output:
  run_history_limit: 50
  default_format: terminal
  color: auto
  ci_mode_auto_detect: true
