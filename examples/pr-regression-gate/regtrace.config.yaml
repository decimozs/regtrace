# Regtrace config — PR Regression Gate
# Blocks PRs when LLM output quality drops below strict thresholds.
# All test cases have filled actual_output — no --generate needed.
project:
  name: pr-regression-gate
  version: "1.0"
  description: PR quality gate for LLM-powered customer FAQ responses

golden_sets:
  - path: golden-sets/qa.yaml
    enabled: true
    weight: 1

metrics:
  enabled: [format, factuality, tone, regression]
  default_threshold: 0.7
  format:
    sub_checks:
      length: true
      json_validity: false
      json_schema: false
      markdown_structure: false
      required_fields: true
      forbidden_content: true
      regex_match: false
    length_tolerance: 0.3
  factuality:
    mode: strict
    claim_extraction_depth: deep
    rag_faithfulness_only: false
  tone:
    tone_profile: "helpful, professional, concise support agent"
    sub_dimensions:
      formality: true
      sentiment: true
      assertiveness: true
      persona_consistency: true
      verbosity: false
  regression:
    enabled: true
    baseline_strategy: last_passing
    tolerance: 0.03
    critical_threshold: 0.1
    exclude_new_test_cases: true

judge:
  primary:
    provider: anthropic
    model: claude-haiku-4-5-20251001
    temperature: 0.1
    max_tokens: 4096
    timeout_ms: 30000
    retry_attempts: 3

run:
  concurrency: 1

quality_gates:
  suite_score_minimum: 0.8
  max_failed_test_cases: 0
  max_low_confidence_ratio: 0.1
  regression_gate: true
  metric_score_minimums:
    factuality: 0.85
    format: 0.8

output:
  run_history_limit: 50
  default_format: terminal
  color: auto
  ci_mode_auto_detect: true
