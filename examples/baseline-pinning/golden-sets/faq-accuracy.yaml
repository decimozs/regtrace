name: faq-accuracy
version: "1.0.0"
description: FAQ response accuracy — weighted higher (weight: 2) in multi-set scoring
interaction_type: single_turn
tags: [faq, accuracy, baseline]
author: regtrace
created_at: "2026-06-01T00:00:00Z"
updated_at: "2026-06-01T00:00:00Z"
test_cases:
  - id: faq-001
    description: Account deletion process
    input: "How do I delete my account?"
    system_prompt: "You are a customer support agent for CloudKit SaaS. Answer factually and clearly. Account deletion is irreversible after 30 days."
    expected_output: "To delete your account, go to Settings > Account > Delete Account. You will be prompted to confirm. Once confirmed, your account enters a 30-day grace period during which you can cancel deletion by contacting support. After 30 days, all data is permanently removed."
    actual_output: "To delete your account, go to Settings > Account > Delete Account. You will be prompted to confirm. Once confirmed, your account enters a 30-day grace period during which you can cancel deletion by contacting support. After 30 days, all data is permanently removed."
    metrics: [factuality, format]
    tags: [account, deletion]
    weight: 2
  - id: faq-002
    description: Password reset instructions
    input: "I forgot my password. How do I reset it?"
    system_prompt: "You are a customer support agent for CloudKit SaaS. Provide step-by-step instructions."
    expected_output: "Go to the login page and click 'Forgot Password'. Enter your email address and we'll send a password reset link. The link expires after 1 hour. If you don't see the email within 5 minutes, check your spam folder or contact support to verify your email is correct."
    actual_output: "Go to the login page and click 'Forgot Password'. Enter your email address and we'll send a password reset link. The link expires after 1 hour. If you don't see the email within 5 minutes, check your spam folder or contact support to verify your email is correct."
    metrics: [factuality, format]
    tags: [password, account]
    weight: 1
