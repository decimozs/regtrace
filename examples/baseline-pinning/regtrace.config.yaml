# Regtrace config — Baseline Pinning
# Uses pinned baseline strategy for stable regression comparison across releases.
# Two golden sets demonstrate multi-set weighting and per-suite configuration.
project:
  name: baseline-pinning-demo
  version: "1.0"
  description: Stable regression baselines for release-ready evaluation

golden_sets:
  - path: golden-sets/faq-accuracy.yaml
    enabled: true
    weight: 2
  - path: golden-sets/tone-consistency.yaml
    enabled: true
    weight: 1

metrics:
  enabled: [format, factuality, tone, regression]
  default_threshold: 0.7
  format:
    sub_checks:
      length: true
      json_validity: false
      json_schema: false
      markdown_structure: false
      required_fields: true
      forbidden_content: true
      regex_match: false
    length_tolerance: 0.3
  factuality:
    mode: strict
    claim_extraction_depth: deep
  tone:
    tone_profile: "professional, accurate, helpful customer support"
    sub_dimensions:
      formality: true
      sentiment: true
      assertiveness: true
      persona_consistency: true
      verbosity: false
  regression:
    enabled: true
    baseline_strategy: last_passing   # CI pin workflow changes this to pinned
    tolerance: 0.05
    critical_threshold: 0.12
    exclude_new_test_cases: true

judge:
  primary:
    provider: anthropic
    model: claude-haiku-4-5-20251001
    temperature: 0.1
    max_tokens: 4096
    timeout_ms: 30000
    retry_attempts: 3

run:
  concurrency: 1

quality_gates:
  suite_score_minimum: 0.75
  max_failed_test_cases: 0
  max_low_confidence_ratio: 0.1
  regression_gate: true

output:
  run_history_limit: 50
  default_format: terminal
  color: auto
  ci_mode_auto_detect: true
