# Regtrace config — Translation example
# Runs with format metrics by default. Add judge key and enable factuality.
project:
  name: translation-qa
  version: "1.0"
  description: Evaluating Spanish translations of English product descriptions

golden_sets:
  - path: golden-sets/translation.yaml
    enabled: true

metrics:
  enabled: [format]
  default_threshold: 0.7
  format:
    sub_checks:
      length: true
      json_validity: false
      json_schema: false
      markdown_structure: false
      required_fields: true
      forbidden_content: false
      regex_match: false
  factuality:
    mode: strict
    claim_extraction_depth: deep
  tone:
    sub_dimensions:
      formality: true
      sentiment: false
      assertiveness: false
      persona_consistency: false
      verbosity: true
  regression:
    enabled: true
    baseline_strategy: last_passing
    tolerance: 0.05
    critical_threshold: 0.15
    exclude_new_test_cases: true

judge:
  primary:
    provider: anthropic
    model: claude-3-5-sonnet-20240620
    temperature: 0.1
    max_tokens: 4096
    timeout_ms: 30000
    retry_attempts: 3
  cost_controls:
    max_tokens_per_run: 100000
    warn_at_tokens: 80000

run:
  concurrency: 1

quality_gates:
  suite_score_minimum: 0.7
  max_failed_test_cases: 1
  max_low_confidence_ratio: 0.1
  regression_gate: true

output:
  run_history_limit: 50
  default_format: terminal
  color: auto
  ci_mode_auto_detect: true
