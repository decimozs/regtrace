project:
  name: test-project
  version: "1.0"
golden_sets:
  - path: golden-sets/qa.yaml
    enabled: true
    weight: 1
metrics:
  enabled: [factuality, format]
  default_threshold: 0.7
  default_weight: 1
  factuality:
    mode: lenient
    claim_extraction_depth: shallow
    rag_faithfulness_only: false
  format:
    sub_checks:
      length: true
      json_validity: false
    length_tolerance: 0.3
    strict_json: false
  tone:
    sub_dimensions:
      formality: false
      sentiment: false
      assertiveness: false
      persona_consistency: false
      verbosity: false
  regression:
    enabled: true
    baseline_strategy: last_passing
    tolerance: 0.05
    critical_threshold: 0.15
    exclude_new_test_cases: true
judge:
  primary:
    provider: anthropic
    model: claude-haiku-4-5-20251001
    temperature: 0.1
    max_tokens: 4096
    timeout_ms: 30000
    retry_attempts: 3
  cost_controls:
    max_tokens_per_run: 100000
    warn_at_tokens: 80000
run:
  concurrency: 1
quality_gates:
  suite_score_minimum: 0.7
  max_failed_test_cases: 1
  max_low_confidence_ratio: 0.1
  regression_gate: true
output:
  run_history_limit: 50
  default_format: terminal
  color: auto
  ci_mode_auto_detect: true
