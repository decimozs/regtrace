name: rag-product-docs
version: 1.0.0
description: Tests faithfulness of responses grounded in product documentation
interaction_type: rag
tags:
  - rag
  - documentation
author: jane@example.com
created_at: "2024-06-01T00:00:00Z"
updated_at: "2024-06-01T00:00:00Z"
test_cases:
  - id: rag-001
    description: Verifies API rate limit claim is faithful to documentation context
    input: "What is the API rate limit?"
    system_prompt: null
    context:
      documents:
        - source: "docs/api-reference.md"
          content: "The API enforces a rate limit of 500 requests per minute per API key."
          retrieval_score: 0.94
    expected_output: "The API rate limit is 500 requests per minute."
    actual_output: "The API rate limit is 500 requests per minute."
    metrics:
      - factuality
      - format
    tags:
      - api
      - rate-limit
    weight: 1.0

  - id: rag-002
    description: Verifies authentication method is faithful to documentation context
    input: "How do I authenticate with the API?"
    system_prompt: null
    context:
      documents:
        - source: "docs/auth.md"
          content: "Authentication is performed using Bearer tokens in the Authorization header. Tokens can be generated from the dashboard settings page."
          retrieval_score: 0.91
    expected_output: "You authenticate by including a Bearer token in the Authorization header. Tokens are generated from the dashboard."
    actual_output: "You authenticate by including a Bearer token in the Authorization header. Tokens are generated from the dashboard."
    metrics:
      - factuality
      - tone
    tags:
      - api
      - auth
    weight: 1.5
